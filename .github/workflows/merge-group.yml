# Jobs that run on merge_group, meaning they must pass before changes land. They also run on pull_request.

on:
    pull_request:
    merge_group:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1
            - run: pre-commit run --all-files

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1
            - run: just lint

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1
            - run: just format

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1
            # The bats suite runs `claude plugin validate`, which needs the claude CLI.
            - run: npm install --global @anthropic-ai/claude-code
            - run: just test

    all-checks:
        name: All checks
        if: ${{ !cancelled() }}
        needs: [pre-commit, lint, format, test]
        runs-on: ubuntu-latest
        steps:
            - uses: re-actors/alls-green@release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
