# Jobs that run on push to main, after pull requests are merged. Jobs here can be a subset of the jobs that run on merge_group. These jobs should never fail since the jobs in merge_group already passed.

on:
    push:
        branches:
            - main

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1
            # The bats suite runs `claude plugin validate`, which needs the claude CLI.
            - run: npm install --global @anthropic-ai/claude-code
            - run: just test
