# Jobs that run on pull_request, but not on merge_group. This is useful for jobs that post comments on Pull Requests.

on:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    # Check if the new commits in a Pull Request contain a merge commit. If so, fail and print them out.
    forbid-merge-commits:
        runs-on: ubuntu-latest
        steps:
            - uses: motlin/forbid-merge-commits-action@49483ed78d3c59ae66e338ad12edd34c6dac7fdf # v1.0.8

    automerge-dependabot:
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Enable auto-merge for Dependabot PR
              run: gh pr merge --rebase --auto "${{ github.event.pull_request.number }}"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    pre-commit-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  cache: true
                  # Pinned: 2026.6.2's minimum_release_age default breaks pipx installs
                  # (pip --uploaded-prior-to needs pip >= 26.0). Unpin once fixed upstream.
                  version: 2026.6.1

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"

            - name: Run pre-commit
              run: |
                  pre-commit run --all-files || true

                  if [[ -n $(git status --porcelain) ]]; then
                    FIX_BRANCH="fix-${{ github.event.pull_request.number }}-pre-commit"
                    git switch --create $FIX_BRANCH

                    git add --all
                    git commit --message "Apply pre-commit fixes."
                    git push --force origin $FIX_BRANCH

                    echo "pre-commit fixes have been pushed to the $FIX_BRANCH branch."
                    exit 1
                  else
                    echo "No changes needed by pre-commit"
                  fi
